<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAC / ONU Formatter</title>
<style>
body { 
    font-family: Arial, sans-serif; 
    background:#f2f2f7; 
    padding:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
  }
  .card {
     background:rgb(229, 244, 248);
     padding:30px; 
     border-radius:12px; 
     width:100%;
     max-width:480px; 
     box-shadow:0 3px 8px rgba(80, 78, 78, 0.1); 
  }
 input { 
    width: 100%;
    max-width: 100%;
    height: 45px;
    margin-top: 10px;
    padding: 0 12px;
    border-radius: 12px; 
    border: 1px solid #ccc; 
    font-size: 16px; 
    text-align: center;
    color: black;
    box-sizing: border-box;
  }

  @media(max-width: 600px) {
    input {
      height: 40px;
      font-size: 16px;
    }
  }

  @media(max-width: 480px) {
    input {
      height: 38px;
      max-width: 100%;
      font-size: 14px;
    }
  }
  .row { display:flex; justify-content:space-between; align-items:center; margin-top:10px; text-align: center; }
  .row button { padding:6px 10px; border:none; border-radius:6px; cursor:pointer; font-size:14px; }
  .button { background:transparent; color:#111; border:1px solid rgba(0,0,0,0.08); }
  .row.format-pairDot  {
    background-color: #92e7e7; 
    border-left:6px solid #20c997; 
    border-radius:12px; 
    border:1px solid #ccc;
 }
  .row.format-pairColon{
    background-color: #92e7e7; 
    border-left:6px solid #28a745;    
     border-radius:12px; 
    border:1px solid #ccc;
 }
  .row.format-pairHyph {
    background-color: #92e7e7; 
    border-left:6px 
    solid #1e90ff;    
     border-radius:12px; 
    border:1px solid #ccc; 
}
  .row.format-quadDot  {background-color: #92e7e7; border-left:6px solid #ffb84d;     border-radius:12px; 
    border:1px solid #ccc; }
  .row.format-quadHyph {background-color: #92e7e7; border-left:6px solid #9b59b6;     border-radius:12px; 
    border:1px solid #ccc; }
  .row.format-quadColon{background-color: #92e7e7; border-left:6px solid #20c997;     border-radius:12px; 
    border:1px solid #ccc; }
  .row .label { margin-bottom:4px; }
  .row .value { font-family:monospace; font-size:15px; word-break:break-all; text-align:center; }
  button { padding:6px 10px; border:none; border-radius:6px; cursor:pointer; font-size:50px; }
  .row button { background:rgb(68, 219, 149); color:#fafafa; border:1px solid rgba(0,0,0,0.08); }
  .label { font-weight:bold; font-size:14px; }
  .value { font-family:monospace; font-size:15px; word-break:break-all; text-align: center; }
  button { padding:6px 10px; border:none; border-radius:6px; background:#007aff; color:white; cursor:pointer; font-size:14px; }
  button:active { opacity:0.8; }
  .invalid { border-color:red; }
  .row > div:first-child {
    flex:1;
    text-align:center;
    color: rgb(7, 0, 0);
  }
  @media(max-width:480px){ .row { flex-direction:column; align-items:flex-center; } button { margin-top:6px; } }

</style>
</head>
<body>
<div class="card">
  <div class="title" style="font-size:22px;font-weight:bold;margin-bottom:10px;">ONU MAC Reformatter</div>

  <label>Input MAC / ONU:</label>
  <input id="macInput" placeholder="Enter MAC (any format)">

  <div id="outputs"></div style="text-align:center"></div>
</div>

<script>
function cleanMac(mac){
  if(!mac) return null;
  const hex = mac.replace(/[^0-9a-fA-F]/g, "");
  return hex.length === 12 ? hex.toLowerCase() : null;
}

function format(norm, type){
  const p = [norm.slice(0,2),norm.slice(2,4),norm.slice(4,6),norm.slice(6,8),norm.slice(8,10),norm.slice(10,12)];
  const q = [norm.slice(0,4),norm.slice(4,8),norm.slice(8,12)];

  switch(type){
    case 'pairDot':   return p.join('.');
    case 'pairColon': return p.join(':');
    case 'pairHyph':  return p.join('-');
    case 'quadDot':   return q.join('.');
    case 'quadHyph':  return q.join('-');
    case 'quadColon': return q.join(':');
  }
}

const formats = [
  { id:'pairDot',   label:'' },
  { id:'pairColon', label:'' },
  { id:'pairHyph',  label:'' },
  { id:'quadDot',   label:'' },
  { id:'quadHyph',  label:'' },
  { id:'quadColon', label:'' }
];

const outputBox = document.getElementById('outputs');
outputBox.innerHTML = formats.map(f => `
<div class='row format-${f.id}'>
    <div>
      <div class='label'>${f.label}</div>
      <div class='value' id='${f.id}'></div>
    </div>
    <button onclick="copyText('${f.id}', this)">Copy</button>
  </div>
`).join('');

document.getElementById('macInput').addEventListener('input', () => {
  const inp = document.getElementById('macInput');
  const m = cleanMac(inp.value.trim());

  if(!m){
    inp.classList.add('invalid');
    formats.forEach(f => document.getElementById(f.id).textContent = "Invalid MAC");
    return;
  }

  inp.classList.remove('invalid');
  formats.forEach(f => {
    document.getElementById(f.id).textContent = format(m, f.id);
  });
});

function copyText(id, btn){
  const val = document.getElementById(id).textContent;
  if(val && val !== "Invalid MAC"){
    navigator.clipboard.writeText(val);
    const prev = btn.textContent;
    btn.textContent = 'Copied!';
    btn.disabled = true;
    setTimeout(() => {
      btn.textContent = prev;
      btn.disabled = false;
    }, 500); // change duration here (ms)
  }
  showToast();
}

/*
function showToast(){
  const t = document.getElementById('toast');
  t.style.display = 'block';
  t.style.opacity = 1;
  setTimeout(() => { t.style.opacity = 0; }, 1200);
  setTimeout(() => { t.style.display = 'none'; }, 1600);
}
*/
</script>
<div id="toast" style="position:fixed;top:15px;left:50%;transform:translateX(-100%);background:#111;color:#fff;padding:10px 18px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .3s;z-index:999;">Copied!</div>
</body>
</html>
