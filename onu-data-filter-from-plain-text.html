<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ONU Data Table Converter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root {
      --bg-deep:     #090d14;
      --bg-panel:    #0d1520;
      --bg-card:     #111c2b;
      --accent:      #00e5ff;
      --accent2:     #00ff99;
      --warn:        #ffcc00;
      --danger:      #ff3b5c;
      --text-main:   #cde8ff;
      --text-dim:    #4d7a9e;
      --border:      #1a3050;
      --glow:        0 0 12px rgba(0,229,255,.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app-wrapper { position: relative; z-index: 1; }

    /* ── Header ── */
    header {
      padding: 2rem 2rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .header-icon {
      width: 42px; height: 42px;
      border: 2px solid var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      box-shadow: var(--glow);
    }
    .header-icon svg { width: 22px; height: 22px; stroke: var(--accent); }
    header h1 {
      font-size: 1.4rem; font-weight: 700; letter-spacing: .06em;
      color: var(--accent);
      text-shadow: var(--glow);
    }
    header span {
      font-size: .75rem; color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
    }

    /* ── Input area ── */
    .input-section { padding: 1.5rem 2rem; }

    .panel-label {
      font-size: .65rem; font-weight: 600; letter-spacing: .15em;
      color: var(--text-dim); text-transform: uppercase;
      margin-bottom: .5rem;
    }
    .panel-label span { color: var(--accent); }

    #rawInput {
      width: 100%;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: 'Share Tech Mono', monospace;
      font-size: .78rem;
      line-height: 1.6;
      padding: 1rem;
      resize: vertical;
      min-height: 180px;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    #rawInput:focus {
      border-color: var(--accent);
      box-shadow: var(--glow);
    }
    #rawInput::placeholder { color: var(--text-dim); }

    .btn-convert {
      background: linear-gradient(135deg, #00b8d9, #00e5ff);
      color: #060d17;
      font-family: 'Exo 2', sans-serif;
      font-weight: 700;
      letter-spacing: .08em;
      font-size: .85rem;
      border: none;
      border-radius: 8px;
      padding: .6rem 1.8rem;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,229,255,.3);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-convert:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,229,255,.5);
    }
    .btn-convert:active { transform: translateY(0); }

    .btn-clear {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 8px;
      padding: .6rem 1.2rem;
      font-family: 'Exo 2', sans-serif;
      font-size: .8rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

    .btn-issue {
      background: linear-gradient(135deg, #c0392b, #ff3b5c);
      color: #fff;
      font-family: 'Exo 2', sans-serif;
      font-weight: 700;
      letter-spacing: .07em;
      font-size: .82rem;
      border: none;
      border-radius: 8px;
      padding: .6rem 1.4rem;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(255,59,92,.35);
      transition: transform .15s, box-shadow .15s;
      display: flex; align-items: center; gap: .45rem;
    }
    .btn-issue:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,59,92,.55); }
    .btn-issue:active { transform: translateY(0); }
    .btn-issue .badge-count {
      background: rgba(255,255,255,.2);
      border-radius: 10px;
      padding: .05rem .45rem;
      font-size: .75rem;
      min-width: 22px;
      text-align: center;
    }

    .btn-pdf {
      background: linear-gradient(135deg, #1a5c38, #00c46a);
      color: #fff;
      font-family: 'Exo 2', sans-serif;
      font-weight: 700;
      letter-spacing: .07em;
      font-size: .82rem;
      border: none;
      border-radius: 8px;
      padding: .6rem 1.4rem;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,196,106,.3);
      transition: transform .15s, box-shadow .15s, opacity .2s;
      display: flex; align-items: center; gap: .45rem;
      opacity: .45;
      pointer-events: none;
    }
    .btn-pdf.active { opacity: 1; pointer-events: auto; }
    .btn-pdf.active:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,196,106,.5); }
    .btn-pdf.active:active { transform: translateY(0); }

    /* ── Issue modal overlay ── */
    .issue-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(5,10,20,.85);
      backdrop-filter: blur(6px);
      z-index: 1000;
      align-items: center; justify-content: center;
    }
    .issue-overlay.show { display: flex; }
    .issue-modal {
      background: var(--bg-card);
  border: 1px solid var(--danger);
  border-radius: 12px;
  width: 95vw;
  max-width: 1100px;
  height: 90vh;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 40px rgba(255,59,92,.25);
  overflow: hidden;
    }
    .issue-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.4rem;
      background: var(--bg-panel);
      border-bottom: 1px solid rgba(255,59,92,.35);
    }
    .issue-modal-header h2 {
      font-size: 1rem; font-weight: 700; letter-spacing: .06em;
      color: var(--danger);
      display: flex; align-items: center; gap: .6rem;
    }
    .issue-modal-header h2 svg { width: 18px; height: 18px; stroke: var(--danger); }
    .modal-close {
      background: none; border: none; color: var(--text-dim);
      font-size: 1.4rem; cursor: pointer; line-height: 1;
      transition: color .15s;
    }
    .modal-close:hover { color: var(--danger); }
    .issue-modal-body { 
  overflow-y: auto;
  overflow-x: auto;
  padding: 1rem 1.4rem;
  flex: 1;
     }
    .issue-modal-footer {
      padding: .75rem 1.4rem;
      border-top: 1px solid var(--border);
      display: flex; gap: .75rem; justify-content: flex-end;
    }
    .issue-summary {
      display: flex; gap: 1rem; flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .issue-chip {
      background: rgba(255,59,92,.1);
      border: 1px solid rgba(255,59,92,.3);
      border-radius: 6px;
      padding: .3rem .75rem;
      font-size: .75rem;
      font-family: 'Share Tech Mono', monospace;
      color: #ff8fa0;
    }
    .issue-chip strong { color: var(--danger); }

    /* issue table */
    .issue-table { width: 100%; border-collapse: collapse; font-size: .8rem; }
    .issue-table thead tr { background: rgba(255,59,92,.12); border-bottom: 1px solid rgba(255,59,92,.3); }
    .issue-table th {
      padding: .6rem .9rem; font-family: 'Share Tech Mono', monospace;
      font-size: .68rem; letter-spacing: .08em; text-transform: uppercase;
      color: #ff8fa0; text-align: left; white-space: nowrap;
    }
    .issue-table tbody tr { border-bottom: 1px solid var(--border); }
    .issue-table tbody tr:last-child { border-bottom: none; }
    .issue-table tbody tr:hover { background: rgba(255,59,92,.04); }
    .issue-table td {
      padding: .6rem .9rem; font-family: 'Share Tech Mono', monospace;
      color: var(--text-main); white-space: nowrap;
    }
    .issue-table td.onu-id { color: var(--accent2); font-weight: 600; }
    .reason-tag {
      display: inline-block; background: rgba(255,59,92,.15);
      border: 1px solid rgba(255,59,92,.3); border-radius: 4px;
      padding: .1rem .45rem; font-size: .72rem; color: #ff8fa0;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      padding: .5rem 2rem 1rem;
    }
    .stat-chip {
      display: flex; align-items: center; gap: .5rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .35rem .75rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: .75rem;
    }
    .stat-chip .dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .stat-chip .val { color: var(--accent); font-weight: 600; }

    /* ── Table section ── */
    .table-section { padding: 0 2rem 3rem; }

    .table-wrapper {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.4);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .82rem;
    }

    thead tr {
      background: var(--bg-panel);
      border-bottom: 2px solid var(--accent);
    }

    th {
      padding: .85rem 1rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      position: relative;
      transition: background .15s;
    }
    th:hover { background: rgba(0,229,255,.08); }

    .sort-indicator {
      display: inline-flex; flex-direction: column;
      gap: 1px; vertical-align: middle;
      margin-left: 6px; opacity: .35;
    }
    .sort-indicator span {
      display: block; width: 0; height: 0;
    }
    .sort-indicator .up {
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-bottom: 5px solid currentColor;
    }
    .sort-indicator .dn {
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid currentColor;
    }
    th.sort-asc  .sort-indicator { opacity: 1; }
    th.sort-asc  .sort-indicator .up  { color: var(--accent2); }
    th.sort-asc  .sort-indicator .dn  { color: var(--text-dim); }
    th.sort-desc .sort-indicator { opacity: 1; }
    th.sort-desc .sort-indicator .dn  { color: var(--accent2); }
    th.sort-desc .sort-indicator .up  { color: var(--text-dim); }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(0,229,255,.05); }

    td {
      padding: .7rem 1rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: .8rem;
      color: var(--text-main);
      white-space: nowrap;
    }

    td.onu-id {
      color: var(--accent2);
      font-weight: 600;
      letter-spacing: .04em;
    }

    /* value badges */
    .badge-val {
      display: inline-block;
      padding: .15rem .55rem;
      border-radius: 4px;
      font-size: .78rem;
    }
    .badge-hot  { background: rgba(255,59,92,.15);  color: #ff6b85; border: 1px solid rgba(255,59,92,.3); }
    .badge-warn { background: rgba(255,204,0,.12);  color: #ffcc00; border: 1px solid rgba(255,204,0,.25); }
    .badge-ok   { background: rgba(0,255,153,.08);  color: #00ff99; border: 1px solid rgba(0,255,153,.2); }
    .badge-low  { background: rgba(0,229,255,.08);  color: #00e5ff; border: 1px solid rgba(0,229,255,.2); }
    .badge-crit { background: rgba(255,59,92,.25);  color: #ff3b5c; border: 1px solid rgba(255,59,92,.5); }

    /* empty state */
    .empty-state {
      text-align: center; padding: 4rem 2rem;
      color: var(--text-dim);
    }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 1rem; stroke: var(--text-dim); }
    .empty-state p { font-size: .9rem; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  @media (max-width: 768px) {

  .issue-modal {
    width: 96vw;
    height: 92vh;
    border-radius: 8px;
  }

  .issue-modal-header h2 {
    font-size: .9rem;
  }

  .issue-table {
    font-size: .75rem;
  }

}
  </style>
</head>

<div class="app-wrapper">

  <!-- Header -->

..."></textarea>
    <div class="d-flex gap-2 mt-3 align-items-center">
      <button class="btn-convert" onclick="convertData()">
        ⚡ CONVERT TO TABLE

      <button class="btn-issue" id="btnIssue" onclick="showIssues()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;stroke:#fff">

      <button class="btn-pdf" id="btnPdf" onclick="downloadIssuePDF()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;stroke:#fff">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="12" y2="18"/><line x1="15" y1="15" x2="12" y2="18"/>
        </svg>
        DOWNLOAD ISSUE PDF
      </button>
      <button class="btn-clear" onclick="clearAll()">✕ Clear</button>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar" style="display:none!important"></div>

  <!-- Table Section -->
  <div class="table-section">
    <div id="tableContainer">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3h18v18H3zM3 9h18M3 15h18M9 3v18M15 3v18"/>
        </svg>
        <p>Paste your ONU data above and click <strong style="color:var(--accent)">Convert to Table</strong></p>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Issue Modal -->
  <div class="issue-overlay" id="issueOverlay">
    <div class="issue-modal">
      <div class="issue-modal-header">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          ONU ISSUE REPORT — RX Power Anomalies
        </h2>
        <button class="modal-close" onclick="closeIssues()">×</button>
      </div>
      <div class="issue-modal-body" id="issueModalBody"></div>
      <div class="issue-modal-footer">
        <button class="btn-pdf active" onclick="downloadIssuePDF(); closeIssues();" style="opacity:1;pointer-events:auto;font-size:.82rem;padding:.6rem 1.4rem;">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;stroke:#fff">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="12" y2="18"/><line x1="15" y1="15" x2="12" y2="18"/>
          </svg>
          DOWNLOAD PDF
        </button>
        <button class="btn-clear" onclick="closeIssues()">Close</button>
      </div>
    </div>
  </div>

EPON0/4:59  33.00             3.29                15.00                 1.89            -25.53
EPON0/4:60  45.00             3.26                11.00                 2.14            -17.80
EPON0/4:61  50.00             3.27                8.00                  2.14            -23.57
EPON0/4:62  42.00             3.30                10.00                 2.32            -27.96
EPON0/4:63  42.00             3.32                9.00                  1.85            -21.74
EPON0/4:64  44.00             3.26                10.00                 2.03            -21.37
EPON0/4:65  45.00             3.37                19.00                 2.17            -13.26
EPON0/4:66  43.98             3.21                15.60                 2.66            -27.70
EPON0/4:69  43.63             3.21                12.80                 2.69            -17.01`;

  document.getElementById('rawInput').value = SAMPLE;

  // ── State ──────────────────────────────────────────────────────────────────
  let tableData   = [];
  let sortCol     = null;
  let sortDir     = 'asc';

  const COLS = [
    { key: 'id',      label: 'ONU-ID',                  type: 'str' },
    { key: 'temp',    label: 'Temp (°C)',                type: 'num' },
    { key: 'volt',    label: 'Voltage (V)',              type: 'num' },
    { key: 'bias',    label: 'TX Bias (mA)',             type: 'num' },
    { key: 'txpow',   label: 'TX Power (dBm)',           type: 'num' },
    { key: 'rxpow',   label: 'RX Power (dBm)',           type: 'num' },
  ];

  // ── Parse ──────────────────────────────────────────────────────────────────
  function parseRaw(raw) {
  const rows = [];
  const lines = raw.split('\n');

  for (const line of lines) {
    const t = line.trim();
    if (!t) continue;

    // ignore headers
    if (t.startsWith('ONU-ID') || t.startsWith('PON/ONU') || t.startsWith('---')) continue;

    // -----------------------------
    // FORMAT 1: EPON0/4:1 format
    // -----------------------------
    if (t.toUpperCase().startsWith('EPON')) {
      const parts = t.split(/\s+/);

      if (parts.length >= 6) {
        rows.push({
          id: parts[0],
          temp: parseFloat(parts[1]),
          volt: parseFloat(parts[2]),
          bias: parseFloat(parts[3]),
          txpow: parseFloat(parts[4]),
          rxpow: parseFloat(parts[5]),
        });
      }
      continue;
    }

    // ----------------------------------
    // FORMAT 2: PON/ONU ONU-NAME format
    // ----------------------------------
    const parts = t.split(/\s+/);

    // detect MAC address
    if (parts.length >= 12 && parts[2].includes(':')) {

      const pon = parts[0];
      const onuName = parts[1];

      rows.push({
        id: pon + " " + onuName,
        temp: parseFloat(parts[3]),
        volt: parseFloat(parts[5]),
        bias: parseFloat(parts[7]),
        txpow: parseFloat(parts[9]),
        rxpow: parseFloat(parts[11]),
      });
    }
  }

  return rows;
}

  // ── Convert ────────────────────────────────────────────────────────────────
  function convertData() {
    const raw = document.getElementById('rawInput').value;
    const parsed = parseRaw(raw);
    if (!parsed.length) {
      alert('⚠ No valid ONU data found. Make sure rows start with EPON and have 6 space-separated columns.');
      return;
    }
    tableData = parsed;
    sortCol = null; sortDir = 'asc';
    renderTable();
    renderStats();
    updateIssueButton();
  }

  function clearAll() {
    document.getElementById('rawInput').value = '';
    tableData = [];
    document.getElementById('tableContainer').innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3h18v18H3zM3 9h18M3 15h18M9 3v18M15 3v18"/>
        </svg>
        <p>Paste your ONU data above and click <strong style="color:var(--accent)">Convert to Table</strong></p>
      </div>`;
    document.getElementById('statsBar').style.setProperty('display','none','important');
    document.getElementById('issueCount').textContent = '0';
    document.getElementById('btnPdf').classList.remove('active');
  }

  // ── Sort ───────────────────────────────────────────────────────────────────
  function sortBy(key) {
    if (sortCol === key) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortCol = key; sortDir = 'asc';
    }
    renderTable();
  }

  function getSorted() {
    if (!sortCol) return [...tableData];
    const col = COLS.find(c => c.key === sortCol);
    return [...tableData].sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      let cmp = col.type === 'num' ? va - vb : va.localeCompare(vb);
      return sortDir === 'asc' ? cmp : -cmp;
    });
  }

  // ── Badge helpers ──────────────────────────────────────────────────────────
  function tempBadge(v) {
    if (v >= 55) return `<span class="badge-val badge-crit">${v.toFixed(2)}</span>`;
    if (v >= 50) return `<span class="badge-val badge-hot">${v.toFixed(2)}</span>`;
    if (v >= 45) return `<span class="badge-val badge-warn">${v.toFixed(2)}</span>`;
    return `<span class="badge-val badge-ok">${v.toFixed(2)}</span>`;
  }
  function voltBadge(v) {
    if (v < 3.20 || v > 3.40) return `<span class="badge-val badge-warn">${v.toFixed(2)}</span>`;
    return `<span class="badge-val badge-ok">${v.toFixed(2)}</span>`;
  }
  function rxBadge(v) {
    if (v <= -30) return `<span class="badge-val badge-crit">${v.toFixed(2)}</span>`;
    if (v <= -26) return `<span class="badge-val badge-hot">${v.toFixed(2)}</span>`;
    if (v <= -22) return `<span class="badge-val badge-warn">${v.toFixed(2)}</span>`;
    return `<span class="badge-val badge-ok">${v.toFixed(2)}</span>`;
  }

  // ── Render Table ───────────────────────────────────────────────────────────
  function renderTable() {
    const rows = getSorted();

    let html = `
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>`;

    COLS.forEach(col => {
      const cls = sortCol === col.key ? (sortDir === 'asc' ? 'sort-asc' : 'sort-desc') : '';
      html += `
              <th class="${cls}" onclick="sortBy('${col.key}')">
                ${col.label}
                <span class="sort-indicator">
                  <span class="up"></span>
                  <span class="dn"></span>
                </span>
              </th>`;
    });

    html += `
            </tr>
          </thead>
          <tbody>`;

    rows.forEach(r => {
      html += `
            <tr>
              <td class="onu-id">${r.id}</td>
              <td>${tempBadge(r.temp)}</td>
              <td>${voltBadge(r.volt)}</td>
              <td><span class="badge-val badge-low">${r.bias.toFixed(2)}</span></td>
              <td>${r.txpow.toFixed(2)}</td>
              <td>${rxBadge(r.rxpow)}</td>
            </tr>`;
    });

    html += `
          </tbody>
        </table>
      </div>`;

    document.getElementById('tableContainer').innerHTML = html;
  }

  // ── Issue Logic: RX outside (-25 to -12) means issue ─────────────────────
  // "up -25 and down -12" = RX < -25 (too weak) OR RX > -12 (too strong)
  function getIssueONUs() {
    return tableData.filter(r => r.rxpow < -25 || r.rxpow > -12);
  }

  function issueReason(r) {
    const reasons = [];
    if (r.rxpow < -25) reasons.push(`RX too weak (${r.rxpow.toFixed(2)} dBm)`);
    if (r.rxpow > -12) reasons.push(`RX too strong (${r.rxpow.toFixed(2)} dBm)`);
    return reasons;
  }

  function updateIssueButton() {
    const count = getIssueONUs().length;
    document.getElementById('issueCount').textContent = count;
    const pdfBtn = document.getElementById('btnPdf');
    if (count > 0) pdfBtn.classList.add('active');
    else pdfBtn.classList.remove('active');
  }

  function showIssues() {
    if (!tableData.length) { alert('⚠ Convert data first.'); return; }
    const issues = getIssueONUs();
    const body = document.getElementById('issueModalBody');

    if (!issues.length) {
      body.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--accent2)">
        <div style="font-size:2rem;margin-bottom:.5rem">✓</div>
        <p style="font-size:.95rem">All ONUs are within acceptable RX range (−25 to −12 dBm)</p></div>`;
    } else {
      const tooWeak  = issues.filter(r => r.rxpow < -25).length;
      const tooStrong = issues.filter(r => r.rxpow > -12).length;
      let html = `
        <div class="issue-summary">
          <div class="issue-chip">Total Issues: <strong>${issues.length}</strong></div>
          <div class="issue-chip">RX Too Weak (&lt;−25 dBm): <strong>${tooWeak}</strong></div>
          <div class="issue-chip">RX Too Strong (&gt;−12 dBm): <strong>${tooStrong}</strong></div>
          <div class="issue-chip" style="color:var(--text-dim)">Normal Range: −25 to −12 dBm</div>
        </div>
        <div style="overflow-x:auto">
        <table class="issue-table">
          <thead><tr>
            <th>#</th><th>ONU-ID</th><th>Temp (°C)</th><th>Voltage (V)</th>
            <th>TX Bias (mA)</th><th>TX Power (dBm)</th><th>RX Power (dBm)</th><th>Issue Reason</th>
          </tr></thead><tbody>`;
      issues.forEach((r, i) => {
        const reasons = issueReason(r);
        html += `<tr>
          <td style="color:var(--text-dim)">${i+1}</td>
          <td class="onu-id">${r.id}</td>
          <td>${r.temp.toFixed(2)}</td>
          <td>${r.volt.toFixed(2)}</td>
          <td>${r.bias.toFixed(2)}</td>
          <td>${r.txpow.toFixed(2)}</td>
          <td><span class="badge-val ${r.rxpow < -30 ? 'badge-crit' : r.rxpow < -25 ? 'badge-hot' : 'badge-warn'}">${r.rxpow.toFixed(2)}</span></td>
          <td>${reasons.map(rs => `<span class="reason-tag">${rs}</span>`).join(' ')}</td>
        </tr>`;
      });
      html += `</tbody></table></div>`;
      body.innerHTML = html;
    }
    document.getElementById('issueOverlay').classList.add('show');
  }

  function closeIssues() {
    document.getElementById('issueOverlay').classList.remove('show');
  }

  // close on backdrop click
  document.getElementById('issueOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeIssues();
  });

  // ── PDF Download ───────────────────────────────────────────────────────────
  function downloadIssuePDF() {
    if (!tableData.length) { alert('⚠ Convert data first.'); return; }
    const issues = getIssueONUs();
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

    const pageW = doc.internal.pageSize.getWidth();
    const now = new Date().toLocaleString();

    // ── Title block ──
    doc.setFillColor(13, 21, 32);
    doc.rect(0, 0, pageW, 28, 'F');
    doc.setFontSize(16);
    doc.setTextColor(255, 59, 92);
    doc.setFont('helvetica', 'bold');
    doc.text('ONU ISSUE REPORT — RX Power Anomalies', 14, 11);
    doc.setFontSize(8);
    doc.setTextColor(77, 122, 158);
    doc.setFont('helvetica', 'normal');
    doc.text(`Generated: ${now}  |  Total ONUs Scanned: ${tableData.length}  |  Issues Found: ${issues.length}  |  RX Normal Range: −25 to −12 dBm`, 14, 19);

    // ── Summary chips ──
    doc.setFontSize(9);
    const tooWeak   = issues.filter(r => r.rxpow < -25).length;
    const tooStrong = issues.filter(r => r.rxpow > -12).length;
    doc.setTextColor(255, 59, 92);
    doc.setFont('helvetica', 'bold');
    doc.text(`Issues: ${issues.length}`, 14, 26);
    doc.setTextColor(77, 122, 158);
    doc.setFont('helvetica', 'normal');
    doc.text(`  RX Too Weak (<-25 dBm): ${tooWeak}   RX Too Strong (>-12 dBm): ${tooStrong}`, 38, 26);

    if (!issues.length) {
      doc.setFontSize(13);
      doc.setTextColor(0, 196, 106);
      doc.text('All ONUs within normal RX range. No issues detected.', pageW/2, 80, { align: 'center' });
    } else {
      const head = [['#', 'ONU-ID', 'Temp (°C)', 'Voltage (V)', 'TX Bias (mA)', 'TX Power (dBm)', 'RX Power (dBm)', 'Issue Reason']];
      const body = issues.map((r, i) => [
        i + 1,
        r.id,
        r.temp.toFixed(2),
        r.volt.toFixed(2),
        r.bias.toFixed(2),
        r.txpow.toFixed(2),
        r.rxpow.toFixed(2),
        issueReason(r).join(' | ')
      ]);

      doc.autoTable({
        head,
        body,
        startY: 32,
        styles: {
          fontSize: 8.5,
          cellPadding: 3,
          font: 'courier',
          textColor: [205, 232, 255],
          fillColor: [17, 28, 43],
          lineColor: [26, 48, 80],
          lineWidth: 0.3,
        },
        headStyles: {
          fillColor: [13, 21, 32],
          textColor: [255, 143, 160],
          fontStyle: 'bold',
          halign: 'center',
        },
        alternateRowStyles: { fillColor: [13, 21, 32] },
        columnStyles: {
          0: { halign: 'center', cellWidth: 10 },
          1: { textColor: [0, 255, 153], fontStyle: 'bold', cellWidth: 28 },
          2: { halign: 'right', cellWidth: 22 },
          3: { halign: 'right', cellWidth: 24 },
          4: { halign: 'right', cellWidth: 28 },
          5: { halign: 'right', cellWidth: 28 },
          6: { halign: 'right', textColor: [255, 59, 92], fontStyle: 'bold', cellWidth: 28 },
          7: { textColor: [255, 143, 160], cellWidth: 'auto' },
        },
        didDrawCell(data) {
          // highlight RX cell row background for critical rows
          if (data.section === 'body' && data.column.index === 6) {
            const val = parseFloat(data.cell.raw);
            if (val < -30) {
              doc.setFillColor(80, 10, 20);
              doc.rect(data.cell.x, data.cell.y, data.cell.width, data.cell.height, 'F');
              doc.setTextColor(255, 59, 92);
              doc.setFontSize(8.5);
              doc.text(data.cell.raw, data.cell.x + data.cell.width/2, data.cell.y + data.cell.height/1.5, { align: 'center' });
            }
          }
        },
        margin: { left: 14, right: 14 },
      });

      // footer
      const finalY = doc.lastAutoTable.finalY + 6;
      doc.setFontSize(7.5);
      doc.setTextColor(77, 122, 158);
      doc.text('* RX Power outside range [−25 dBm, −12 dBm] indicates signal issues. Values below −25 dBm = weak signal / fiber loss. Values above −12 dBm = overdriven / too close.', 14, finalY);
    }

    doc.save(`ONU_Issue_Report_${new Date().toISOString().slice(0,10)}.pdf`);
  }

  function renderStats() {
    const bar = document.getElementById('statsBar');
    bar.style.removeProperty('display');

    const temps  = tableData.map(r => r.temp);
    const rxpows = tableData.map(r => r.rxpow);
    const hotCount  = temps.filter(t => t >= 50).length;
    const weakCount = rxpows.filter(r => r <= -26).length;

    bar.innerHTML = `
      <div class="stat-chip">
        <span class="dot" style="background:var(--accent2)"></span>
        Total ONUs: <span class="val">${tableData.length}</span>
      </div>
      <div class="stat-chip">
        <span class="dot" style="background:var(--warn)"></span>
        High Temp ≥50°C: <span class="val" style="color:var(--warn)">${hotCount}</span>
      </div>
      <div class="stat-chip">
        <span class="dot" style="background:var(--danger)"></span>
        Weak RX ≤−26dBm: <span class="val" style="color:var(--danger)">${weakCount}</span>
      </div>
      <div class="stat-chip">
        <span class="dot" style="background:var(--accent)"></span>
        Avg Temp: <span class="val">${(temps.reduce((a,b)=>a+b,0)/temps.length).toFixed(1)} °C</span>
      </div>
      <div class="stat-chip">
        <span class="dot" style="background:var(--accent)"></span>
        Avg RX: <span class="val">${(rxpows.reduce((a,b)=>a+b,0)/rxpows.length).toFixed(2)} dBm</span>
      </div>`;
  }
</script>
</body>
</html>
