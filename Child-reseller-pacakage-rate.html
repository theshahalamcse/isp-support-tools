<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A vs B Percentage Auto</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

<div class="container">
    <h4 class="mb-3">Business Logic: A + B = C based on Row 1 % (Rows 2-5 auto-generate from Row 1)</h4>

    <table class="table table-bordered text-center">
        <thead class="table-dark">
            <tr>
                <th>Column A</th>
                <th>Column B</th>
                <th>C = A + B</th>
                <th>% B vs A</th>
            </tr>
        </thead>
        <tbody>
            <!-- Row 1 -->
            <tr>
                <td><input type="number" id="a1" class="form-control text-center" oninput="calculateRows()"></td>
                <td><input type="number" id="b1" class="form-control text-center" oninput="calculateRows()"></td>
                <td id="c1"></td>
                <td id="p1"></td>
            </tr>
            <!-- Rows 2-5 (Auto-generate B based on Row 1 %) -->
            <tr>
                <td><input type="number" id="a2" class="form-control text-center" oninput="calculateRows()"></td>
                <td id="b2"></td>
                <td id="c2"></td>
                <td id="p2"></td>
            </tr>
            <tr>
                <td><input type="number" id="a3" class="form-control text-center" oninput="calculateRows()"></td>
                <td id="b3"></td>
                <td id="c3"></td>
                <td id="p3"></td>
            </tr>
            <tr>
                <td><input type="number" id="a4" class="form-control text-center" oninput="calculateRows()"></td>
                <td id="b4"></td>
                <td id="c4"></td>
                <td id="p4"></td>
            </tr>
            <tr>
                <td><input type="number" id="a5" class="form-control text-center" oninput="calculateRows()"></td>
                <td id="b5"></td>
                <td id="c5"></td>
                <td id="p5"></td>
            </tr>
            <!-- Sum row -->
            <tr class="table-secondary fw-bold">
                <td colspan="2">Total</td>
                <td id="sumC"></td>
                <td></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
function calculateRows() {
    let A1 = parseFloat(document.getElementById("a1").value);
    let B1 = parseFloat(document.getElementById("b1").value);
    let percent1 = 0;

    if (!isNaN(A1) && !isNaN(B1) && A1 !== 0) {
        percent1 = (B1 / A1) * 100;
        document.getElementById("c1").innerHTML = (A1 + B1).toFixed(2);
        document.getElementById("p1").innerHTML = percent1.toFixed(2) + "%";
    } else {
        document.getElementById("c1").innerHTML = "";
        document.getElementById("p1").innerHTML = "";
    }

    let sumC = (!isNaN(A1) && !isNaN(B1) && A1 !== 0) ? (A1 + B1) : 0;

    // Rows 2-5: Auto-generate based on Row 1 %
    for (let i = 2; i <= 5; i++) {
        let Ai = parseFloat(document.getElementById("a" + i).value);

        if (!isNaN(Ai)) {
            let Bi = Ai * (percent1 / 100);
            document.getElementById("b" + i).innerHTML = Bi.toFixed(2);

            let Ci = Ai + Bi;
            document.getElementById("c" + i).innerHTML = Ci.toFixed(2);

            document.getElementById("p" + i).innerHTML = percent1.toFixed(2) + "%";

            sumC += Ci;
        } else {
            document.getElementById("b" + i).innerHTML = "";
            document.getElementById("c" + i).innerHTML = "";
            document.getElementById("p" + i).innerHTML = "";
        }
    }

    document.getElementById("sumC").innerHTML = sumC.toFixed(2);
}
</script>

</body>
</html>
