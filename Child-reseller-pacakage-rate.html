<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Child Reseller Package Rate</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
input[type=number]::-webkit-inner-spin-button, 
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
/* Change placeholder color */
.form-control::placeholder {
    color: #0000003b; /* Red color */
    opacity: 1;      /* Optional: make sure color is fully opaque */
}
.form-control:focus::placeholder {
    color: transparent;
}
#toast {
  position: fixed;
  cursor: pointer;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #000000;
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 9999;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

#toast.show {
  opacity: 1;
}
#c1, #c2, #c3, #c4, #c5 {
    border: 2px dotted rgba(0, 0, 0, 0.342) !important;
    padding: 8px;
    cursor: pointer;
     
}
#c1:hover, #c2:hover, #c3:hover, #c4:hover, #c5:hover {
    background-color: #bebebe2f;
    
     
}

</style>
</head>
<body class="bg-light p-4">
    <div id="toast">Copied!</div>

<div class="container">
    <h4 class="mb-3 text-align-center text-center">Business Logic: A + B = C based on Row 1 % (Rows 2-5 auto-generate from Row 1)</h4>

    <table class="table table-bordered text-center">
        <thead class="table-dark">
            <tr>
                <th>BASE PRICE</th>
                <th>Extra Balance Add</th>
                <th>Final Price</th>
                <th>% Extra Balance Added</th>
            </tr>
        </thead>
        <tbody>
            <!-- Row 1 -->
            <tr class="">
                <td><input type="number" id="a1" class="form-control text-center" oninput="calculateRows()" placeholder="Input your base price"></td>
                <td><input type="number" id="b1" class="form-control text-center" oninput="calculateRows()" placeholder="Input Extra Balance "></td>
                <td id="c1"></td>
                <td id="p1"></td>
            </tr>
            <!-- Rows 2-5 (Auto-generate B based on Row 1 %) -->
            <tr>
                <td><input type="number" id="a2" class="form-control text-center" oninput="calculateRows()" placeholder="Input your base price"></td>
                <td id="b2"></td>
                <td id="c2" class=""></td>
                <td id="p2"></td>
            </tr>
            <tr>
                <td><input type="number" id="a3" class="form-control text-center" oninput="calculateRows()" placeholder="Input your base price"></td>
                <td id="b3"></td>
                <td id="c3"></td>
                <td id="p3"></td>
            </tr>
            <tr>
                <td><input type="number" id="a4" class="form-control text-center" oninput="calculateRows()" placeholder="Input your base price"></td>
                <td id="b4"></td>
                <td id="c4"></td>
                <td id="p4"></td>
            </tr>
            <tr>
                <td><input type="number" id="a5" class="form-control text-center" oninput="calculateRows()" placeholder="Input your base price"></td>
                <td id="b5"></td>
                <td id="c5"></td>
                <td id="p5"></td>
            </tr>
            <!-- Sum row -->
<!--           <tr class="table-secondary fw-bold">
                <td colspan="2">Total</td>
                <td id="sumC"></td>
                <td></td>
            </tr>
 -->  
        </tbody>
    </table>
</div>

<script>
function calculateRows() {
    let A1 = parseFloat(document.getElementById("a1").value);
    let B1 = parseFloat(document.getElementById("b1").value);
    let percent1 = 0;

    if (!isNaN(A1) && !isNaN(B1) && A1 !== 0) {
        percent1 = (B1 / A1) * 100;
        document.getElementById("c1").innerHTML = (A1 + B1).toFixed(2);
        document.getElementById("p1").innerHTML = percent1.toFixed(2) + "%";
    } else {
        document.getElementById("c1").innerHTML = "";
        document.getElementById("p1").innerHTML = "";
    }

    let sumC = (!isNaN(A1) && !isNaN(B1) && A1 !== 0) ? (A1 + B1) : 0;

    // Rows 2-5: Auto-generate based on Row 1 %
    for (let i = 2; i <= 5; i++) {
        let Ai = parseFloat(document.getElementById("a" + i).value);

        if (!isNaN(Ai)) {
            let Bi = Ai * (percent1 / 100);
            document.getElementById("b" + i).innerHTML = Bi.toFixed(2);

            let Ci = Ai + Bi;
            document.getElementById("c" + i).innerHTML = Ci.toFixed(2);

            document.getElementById("p" + i).innerHTML = percent1.toFixed(2) + "%";

            sumC += Ci;
        } else {
            document.getElementById("b" + i).innerHTML = "";
            document.getElementById("c" + i).innerHTML = "";
            document.getElementById("p" + i).innerHTML = "";
        }
    }

}
function enableCopyOnResults(ids = ['c1','c2','c3','c4','c5']) {
    ids.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.add('copyable');
        el.addEventListener('click', async () => {
            const text = el.textContent.trim();
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
                const original = el.textContent;
                // Show toast
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                
                setTimeout(() => {
                    el.classList.remove('copied');
                    el.textContent = original;
                    toast.classList.remove('show');
                }, 300); // change duration (ms) as needed
            } catch (err) {
                console.error('Copy failed', err);
            }
        });
    });
}

// initialize copy handlers after DOM ready
document.addEventListener('DOMContentLoaded', () => {
    enableCopyOnResults();
    // ensure calculateRows runs if default values present
    calculateRows();
});
</script>

</body>
</html>
