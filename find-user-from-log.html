
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>
body { background: transparent; font-family: var(--font-sans, sans-serif); }
textarea { font-family: var(--font-mono, monospace); font-size: 12px; resize: vertical; background: var(--color-background-primary, #fff); color: var(--color-text-primary, #000); border: 1px solid #dee2e6; }
textarea:focus { outline: none; box-shadow: 0 0 0 2px #0d6efd55; border-color: #0d6efd; }
#output { font-family: var(--font-mono, monospace); font-size: 13px; background: var(--color-background-secondary, #f8f9fa); color: var(--color-text-primary, #000); border: 1px solid #dee2e6; border-radius: 6px; padding: 14px 16px; min-height: 80px; white-space: pre; overflow-x: auto; user-select: text; line-height: 1.7; }
.stat-box { background: var(--color-background-secondary, #f8f9fa); border: 1px solid #dee2e6; border-radius: 6px; padding: 10px 16px; }
.stat-box .num { font-size: 22px; font-weight: 500; }
.stat-box .lbl { font-size: 11px; color: #6c757d; }
#copyBtn { min-width: 90px; }
</style>
</head>
<body>
<div class="container p-3 bg-success">

  <div class="mb-2">
    <label class="form-label fw-500 mb-1" style="font-size:13px;">Paste log text</label>
    <textarea id="logInput" class="form-control" rows="8" placeholder="Paste PPPoE log lines here..."></textarea>
  </div>

  <div class="d-flex gap-2 mb-3">
    <button class="btn btn-primary btn-sm px-4" onclick="process()">Extract</button>
    <button class="btn btn btn-primary btn-sm" onclick="clearAll()">Clear</button>
  </div>

  <div class="row g-2 mb-3" id="statsRow" style="display:none!important;">
    <div class="col-4">
      <div class="stat-box text-center">
        <div class="num" id="sTotalLines">0</div>
        <div class="lbl">Total lines</div>
      </div>
    </div>
    <div class="col-4">
      <div class="stat-box text-center">
        <div class="num" id="sFound">0</div>
        <div class="lbl">Found </div>
      </div>
    </div>
    <div class="col-4">
      <div class="stat-box text-center">
        <div class="num text-success" id="sUnique">0</div>
        <div class="lbl">Unique</div>
      </div>
    </div>
  </div>

  <div id="resultWrap" style="display:none;">
    <div class="d-flex align-items-center justify-content-between mb-1">
      <span style="font-size:12px;color:#000000;">Unique usernames — view only</span>
      <button class="btn btn btn-primary btn-sm" id="copyBtn" onclick="copyOutput()">Copy</button>
    </div>
    <div id="output"></div>
  </div>

</div>

<script>
function process() {
  const raw = document.getElementById('logInput').value;
  const lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);

  const found = [];
  for (const line of lines) {
    const m = line.match(/\buser\s+(\S+)/);
    if (m) found.push(m[1]);
  }

  const unique = [...new Set(found.map(u => u.toLowerCase()))].map(u => {
    return found.find(f => f.toLowerCase() === u);
  });

  document.getElementById('sTotalLines').textContent = lines.length;
  document.getElementById('sFound').textContent = found.length;
  document.getElementById('sUnique').textContent = unique.length;
  document.getElementById('statsRow').style.display = '';
  document.getElementById('resultWrap').style.display = '';

  document.getElementById('output').textContent = unique.length > 0
    ? unique.join('\n')
    : '(no "user" entries found)';
}

function copyOutput() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1600);
  });
}

function clearAll() {
  document.getElementById('logInput').value = '';
  document.getElementById('output').textContent = '';
  document.getElementById('statsRow').style.display = 'none';
  document.getElementById('resultWrap').style.display = 'none';
}
</script>
</body>
</html>
