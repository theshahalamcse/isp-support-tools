<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="style.css">
  <title>OLD SOFT DATE FORMAT TO NEW SOFT DATE FORMAT</title>
  <style>
    body { font-family: Arial, sans-serif; max-width:800px; margin:20px; }
    pre { background:#bcf5dd; padding:10px; border-radius:6px; white-space:pre-wrap; }
    button { margin-top:10px; padding:6px 12px; border:none; border-radius:6px; cursor:pointer; background:#0078d7; color:white; }
    button:hover { background:#7faac9; }
    #errors { color:crimson; }
    .top-controls { display:flex; gap:10px; align-items:center; margin-bottom:10px; }
  </style>
</head>
<body>
  <h2>
  <a href="PonNameReplacementWithID.html" style="text-decoration:none; color:#007bff;">
    POP NAME Replacement With ID (EX: SHK-PACHDONA = 505)
  </a>
  <h2>Convert Dates → Short Form (e.g. 5 Jun 2025)</h2>

  <div class="top-controls">
    <input type="file" id="fileInput" accept=".txt" />
    <button id="convertBtn">Convert</button>
    <button id="copyBtn" style="display:none;">Copy Converted Dates</button>
  </div>

  <h3>Converted Output</h3>
  <pre id="preview">(no data yet)</pre>

  <h3>Invalid / Skipped Lines</h3>
  <pre id="errors">(none)</pre>

<script>
const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const monthMap = {
  "JANUARY":1,"JAN":1,
  "FEBRUARY":2,"FEB":2,
  "MARCH":3,"MAR":3,
  "APRIL":4,"APR":4,
  "MAY":5,
  "JUNE":6,"JUN":6,
  "JULY":7,"JUL":7,
  "AUGUST":8,"AUG":8,
  "SEPTEMBER":9,"SEPT":9,"SEP":9,
  "OCTOBER":10,"OCT":10,
  "NOVEMBER":11,"NOV":11,
  "DECEMBER":12,"DEC":12
};

function parseDateLine(line) {
  if (!line) return null;
  let s = line.replace(/^\uFEFF/, "").trim().replace(/[,;]+$/, "").trim();

  // DD/MM/YY or DD-MM-YY
  let m = s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})$/);
  if (m) {
    const dd = parseInt(m[1], 10);
    const mm = parseInt(m[2], 10);
    const yyyy = normalizeYear(m[3]);
    if (!isValidDayMonth(dd, mm, yyyy)) return null;
    return `${dd} ${months[mm-1]} ${yyyy}`;
  }

  // ISO YYYY-MM-DD
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (m) {
    const yyyy = parseInt(m[1], 10);
    const mm = parseInt(m[2], 10);
    const dd = parseInt(m[3], 10);
    if (!isValidDayMonth(dd, mm, yyyy)) return null;
    return `${dd} ${months[mm-1]} ${yyyy}`;
  }

  // DD-MMM-YY / DD-MMM-YYYY / DD-MMMM-YY / DD-MMMM-YYYY
  m = s.match(/^(\d{1,2})-([A-Za-z]{3,9})-(\d{2,4})$/);
  if (m) {
    const dd = parseInt(m[1], 10);
    const monTxt = m[2].toUpperCase();
    const mm = monthMap[monTxt];
    if (!mm) return null;
    const yyyy = normalizeYear(m[3]);
    if (!isValidDayMonth(dd, mm, yyyy)) return null;
    return `${dd} ${months[mm-1]} ${yyyy}`;
  }

  return null;
}

function normalizeYear(yStr) {
  if (yStr.length === 2) {
    const y = parseInt(yStr, 10);
    return (y < 50) ? 2000 + y : 1900 + y;
  }
  return parseInt(yStr, 10);
}

function isValidDayMonth(dd, mm, yyyy) {
  if (!(mm >= 1 && mm <= 12 && dd >= 1 && dd <= 31)) return false;
  const mdays = [31, (isLeap(yyyy) ? 29 : 28), 31,30,31,30,31,31,30,31,30,31];
  return dd <= mdays[mm - 1];
}
function isLeap(y) { return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0); }

document.getElementById('convertBtn').addEventListener('click', () => {
  const fileInput = document.getElementById('fileInput');
  if (!fileInput.files.length) {
    alert('Please select a .txt file containing dates.');
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    let text = String(e.target.result).replace(/\r\n/g, '\n').replace(/^\uFEFF/, '');
    const lines = text.split('\n');

    const converted = [];
    const invalid = [];
    for (let rawLine of lines) {
      const trimmed = rawLine.trim();
      if (!trimmed) continue;
      const out = parseDateLine(trimmed);
      if (out) converted.push(out);
      else invalid.push(trimmed);
    }

    const preview = document.getElementById('preview');
    const errors = document.getElementById('errors');
    const copyBtn = document.getElementById('copyBtn');

    preview.textContent = converted.length ? converted.join('\n') : '(no valid dates found)';
    errors.textContent = invalid.length ? invalid.join('\n') : '(none)';
    copyBtn.style.display = converted.length ? 'inline-block' : 'none';
  };
  reader.readAsText(fileInput.files[0], 'UTF-8');
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('preview').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = 'Copy Converted Dates', 2000);
  });
});
</script>
</body>
</html>
