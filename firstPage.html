<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EASY SHOP MGMNT</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background-color: #73C8D2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      text-align: center;
    }

    .login-box {
      background-color: white;
      padding: 30px 40px;
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      display: inline-block;
      width: 320px;
    }

    .login-box h2 {
      margin-bottom: 20px;
      color: #333;
      font-size: 14px;
      font-weight: 400;
    }

    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: 14px;
    }

    .form-group label {
      font-size: 13px;
      color: #333;
    }

    .remember {
      display: flex;
      align-items: center;
      font-size: 13px;
    }

    .remember input {
      margin-right: 5px;
    }

    .btn {
      background-color: #0077A2;
      border: none;
      color: white;
      padding: 10px 0;
      width: 100%;
      border-radius: 3px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.3s;
    }

    .btn:hover {
      background-color: #005c7a;
    }

    .forgot {
      text-align: right;
      margin-top: 10px;
    }

    .forgot a {
      font-size: 13px;
      color: #0077A2;
      text-decoration: none;
    }

    .forgot a:hover {
      text-decoration: underline;
    }

    .logo {
      margin-bottom: 20px;
    }

    .logo img {
      width: 150px;
	  color: black;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <!-- Replace with your own logo -->
      <img src="logo.png" alt="EASY SHOP MGMNT">
    </div>
    <div class="login-box">
      <h2>Sign in to start your session</h2>
      <form action="dashboard.php" method="POST">
        <div class="form-group">
          <input type="email" name="email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="password" name="password" placeholder="Password" required>
        </div>
        <div class="form-group remember">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Remember Me.</label>
        </div>
        <button type="submit" class="btn">SIGN IN</button>
        <div class="forgot">
          <a href="#">Forgot password ?</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
