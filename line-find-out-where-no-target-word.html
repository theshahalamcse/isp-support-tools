<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Line Filter (Exclude Words Live)</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card-bg: #fff;
    --border: #d0d7de;
    --radius: 10px;
    --shadow: 0 2px 8px rgba(0,0,0,0.06);
    --text: #222;
  }

  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 20px;
  }

  h2 {
    text-align: center;
    margin-bottom: 16px;
    font-weight: 600;
  }

  .container {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .box {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    flex: 1 1 320px;
    min-width: 280px;
    padding: 12px;
    display: flex;
    flex-direction: column;
  }

  label {
    font-weight: 600;
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    min-height: 260px;
    padding: 10px;
    resize: vertical;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: monospace;
    font-size: 14px;
    background: #fafafa;
    transition: all 0.2s ease;
  }

  textarea:focus {
    background: #fff;
    outline: none;
    border-color: #0d6efd;
    box-shadow: 0 0 0 2px rgba(13,110,253,0.2);
  }

  button {
    margin-top: 8px;
    padding: 10px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #0d6efd;
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }

  button:hover {
    background: #0b5ed7;
  }

  .toast {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: #fff;
    padding: 8px 14px;
    border-radius: 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 999;
  }

  .toast.show {
    opacity: 1;
  }

  @media (max-width: 768px) {
    h2 { font-size: 18px; }
    textarea { min-height: 200px; font-size: 13px; }
    button { padding: 8px 10px; font-size: 13px; }
  }
</style>
</head>
<body>

<h2>Live Line Filter — Show Lines Without Certain Words</h2>

<div class="toast" id="toast">Copied!</div>

<div class="container">
  <div class="box">
    <label>Input Text</label>
    <textarea id="inputText" placeholder="Enter your main text here...">apple is red
banana is yellow
orange is juicy
apple pie is sweet</textarea>
  </div>

  <div class="box">
    <label>Words to Exclude (one per line)</label>
    <textarea id="excludeWords" placeholder="Enter words to remove lines...">apple
sweet</textarea>
  </div>

  <div class="box">
    <label>Output (filtered result)</label>
    <textarea id="outputText" readonly></textarea>
    <button id="copyBtn">Copy Output</button>
  </div>
</div>

<script>
const inputEl = document.getElementById('inputText');
const excludeEl = document.getElementById('excludeWords');
const outputEl = document.getElementById('outputText');
const toast = document.getElementById('toast');
const copyBtn = document.getElementById('copyBtn');

function showToast(text = 'Copied!', ms = 1200) {
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), ms);
}

function filterLines() {
  const lines = inputEl.value.split(/\r?\n/);
  const excludeWords = excludeEl.value.split(/\r?\n/).map(w => w.trim()).filter(Boolean);

  const result = lines.filter(line => {
    return !excludeWords.some(word =>
      line.toLowerCase().includes(word.toLowerCase())
    );
  }).join('\n');

  outputEl.value = result;
}

inputEl.addEventListener('input', filterLines);
excludeEl.addEventListener('input', filterLines);

copyBtn.addEventListener('click', async () => {
  await navigator.clipboard.writeText(outputEl.value);
  showToast('Copied to clipboard');
});

filterLines();
</script>

</body>
</html>
