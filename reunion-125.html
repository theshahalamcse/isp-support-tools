<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reunion Fee Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">

<style>
:root{
  --color-text-primary:#111827;
  --color-text-secondary:#6B7280;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f9fafb;
  --color-border-tertiary:#e5e7eb;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'SolaimanLipi',sans-serif;
  background:#eef2ff;
}

/* App container */
.app{
  max-width:420px;
  margin:0 auto;
  min-height:100vh;
  background:#fff;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* Header */
.app-header{
  position:sticky;
  top:0;
  z-index:10;
  background:linear-gradient(135deg,#7C3AED,#2563EB);
  color:#fff;
  padding:14px;
  text-align:center;
  font-weight:700;
}

/* Content */
.main-wrap{
  padding:14px 14px 90px;
}

/* Cards */
.radio-batch-label,
.radio-guest-label,
.info-card,
.summary-inner{
  box-shadow:0 4px 12px rgba(0,0,0,.04);
}

/* Step */
.step-label{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.step-num{width:30px;height:30px;border-radius:50%;background:#7C3AED;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}

/* Batch card */
.radio-batch-label{
  display:flex;
  align-items:center;
  justify-content:space-between;
  border:2px solid #e5e7eb;
  border-radius:14px;
  padding:14px;
  cursor:pointer;
}

.radio-batch-label.checked{
  border-color:#7C3AED;
  background:#F5F3FF;
}

.fee-badge{
  background:#eee;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

/* Guest */
.radio-guest-label{
  display:flex;
  align-items:center;
  gap:10px;
  border:2px solid #e5e7eb;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
}

.radio-guest-label.checked{
  border-color:#7C3AED;
  background:#F5F3FF;
}

/* Counter */
.counter-area{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  margin-top:10px;
}

.cnt-btn{
  width:48px;height:48px;
  border:none;
  border-radius:50%;
  background:#7C3AED;
  color:#fff;
  font-size:22px;
}

.cnt-num{
  font-size:28px;
  font-weight:700;
}

/* Summary */
.summary-inner{
  background:#fff;
  padding:14px;
  border-radius:14px;
}

.s-row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  font-size:14px;
}

/* Bottom bar */
.bottom-bar{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  max-width:420px;
  width:100%;
  background:#fff;
  border-top:1px solid #ddd;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.pay-btn{
  background:#7C3AED;
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:10px;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="app">

<div class="app-header">🎉 Reunion Fee Calculator</div>

<div class="main-wrap">

<!-- Step 1 -->
<div class="step-label">
  <div class="step-num">1</div>
  <div>ব্যাচ নির্বাচন করুন</div>
</div>

<div onclick="selectBatch('1980-2000',1000,this)" class="radio-batch-label">
  <span>১৯৮০–২০০০</span>
  <span class="fee-badge">৳ 1000</span>
</div>

<div onclick="selectBatch('2001-2015',700,this)" class="radio-batch-label mt-2">
  <span>২০০১–২০১৫</span>
  <span class="fee-badge">৳ 700</span>
</div>

<div onclick="selectBatch('2016-2025',500,this)" class="radio-batch-label mt-2">
  <span>২০১৬–২০২৫</span>
  <span class="fee-badge">৳ 500</span>
</div>

<!-- Step 2 -->
<div id="guestSec" class="hidden mt-4">
  <div class="step-label">
    <div class="step-num">2</div>
    <div>গেস্ট?</div>
  </div>

  <div onclick="setGuest(true,this)" class="radio-guest-label">হ্যাঁ</div>
  <div onclick="setGuest(false,this)" class="radio-guest-label mt-2">না</div>

  <div id="guestCount" class="hidden">
    <div class="counter-area">
      <button class="cnt-btn" onclick="changeGuest(-1)">-</button>
      <div class="cnt-num" id="gnum">1</div>
      <button class="cnt-btn" onclick="changeGuest(1)">+</button>
    </div>
  </div>
</div>

<!-- Step 3 -->
<div id="summarySec" class="hidden mt-4">
  <div class="step-label">
    <div class="step-num">3</div>
    <div>সারসংক্ষেপ</div>
  </div>

  <div class="summary-inner" id="summary"></div>
</div>

</div>

<!-- Bottom -->
<div class="bottom-bar">
  <div id="total">৳ 0</div>
  <button class="pay-btn">Proceed</button>
</div>

</div>

<script>
let S={batch:null,fee:0,guest:false,count:1};
const GFEE=500;

function bn(n){return n.toString().replace(/\d/g,d=>'০১২৩৪৫৬৭৮৯'[d]);}
function fmt(n){return '৳ '+bn(n);}

function selectBatch(batch,fee,el){
  document.querySelectorAll('.radio-batch-label').forEach(e=>e.classList.remove('checked'));
  el.classList.add('checked');

  S.batch=batch;
  S.fee=fee;

  document.getElementById('guestSec').classList.remove('hidden');
}

function setGuest(val,el){
  document.querySelectorAll('.radio-guest-label').forEach(e=>e.classList.remove('checked'));
  el.classList.add('checked');

  S.guest=val;
  S.count=1;

  if(val){
    document.getElementById('guestCount').classList.remove('hidden');
  }else{
    document.getElementById('guestCount').classList.add('hidden');
  }

  document.getElementById('summarySec').classList.remove('hidden');
  render();
}

function changeGuest(d){
  if(!S.guest) return;
  S.count=Math.max(1,S.count+d);
  document.getElementById('gnum').innerText=bn(S.count);
  render();
}

function render(){
  let guestFee=S.guest?S.count*GFEE:0;
  let total=S.fee+guestFee;

  let html=`
    <div class="s-row"><span>ব্যাচ</span><span>${fmt(S.fee)}</span></div>
    <div class="s-row"><span>গেস্ট</span><span>${fmt(guestFee)}</span></div>
  `;

  document.getElementById('summary').innerHTML=html;
  document.getElementById('total').innerText=fmt(total);
}
</script>

</body>
</html>
