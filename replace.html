<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PON Name Replacement With ID (Bootstrap Responsive)</title>

<!-- ✅ Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body {
    background: #f8f9fa;
    font-family: "Segoe UI", sans-serif;
  }

  h2 {
    text-align: center;
    margin: 25px 0;
    font-weight: 600;
    color: #333;
  }

  textarea {
    width: 100%;
    height: 280px;
    resize: none;
    font-family: monospace;
    font-size: 14px;
    border-radius: 8px;
    padding: 10px;
    border: 1px solid #ced4da;
    background-color: #fff;
  }

  textarea:focus {
    outline: none;
    border-color: #0d6efd;
    box-shadow: 0 0 5px rgba(13,110,253,0.3);
  }

  .btn-custom {
    position: absolute;
    top: 8px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 13px;
  }

  .copy-btn {
    right: 10px;
    background-color: #0d6efd;
    color: white;
    border: none;
  }

  .copy-btn:hover {
    background-color: #0b5ed7;
  }

  .unique-btn {
    left: 300px;
	
    background-color: #198754;
    color: white;
    border: none;
  }

  .unique-btn:hover {
    background-color: #157347;
  }

  .position-relative {
    position: relative;
  }
</style>
</head>
<body>

<div class="container-fluid">
  <h2>🔁 PON Name Replacement With ID (Bootstrap Responsive)</h2>

  <div class="row g-3">
    <!-- Input -->
    <div class="col-12 col-md-4 position-relative">
      <label class="form-label fw-bold">Input (PON Names)</label>
      <textarea id="inputText" class="form-control" placeholder="Example:
PON-A
PON-B
PON-A
PON-C"></textarea>
    </div>

    <!-- Mapping -->
    <div class="col-12 col-md-4">
      <label class="form-label fw-bold">Mapping (Name=ID)</label>
      <textarea id="mappingText" class="form-control" placeholder="Example:
PON-A=101
PON-B=102
PON-C=103"></textarea>
    </div>

    <!-- Output -->
    <div class="col-12 col-md-4 position-relative">
      <label class="form-label fw-bold">Output (Converted IDs)</label>
      <button class="btn-custom copy-btn" onclick="copyOutput()">Copy</button>
      <textarea id="outputText" class="form-control" placeholder="Result will appear here..." readonly></textarea>
    </div>
  </div>

  <!-- Unique Section -->
  <div class="row g-3 mt-4">
    <div class="col-12 position-relative">
      <label class="form-label fw-bold">Unique PON Names (from Input)</label>
      <button class="btn-custom unique-btn" onclick="generateUnique()">Find Unique</button>
      <textarea id="uniqueText" class="form-control" placeholder="Unique lines will appear here..." readonly></textarea>
    </div>
  </div>
</div>

<!-- ✅ Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function convertText() {
  const input = document.getElementById('inputText').value.trim().split(/\r?\n/);
  const mappingLines = document.getElementById('mappingText').value.trim().split(/\r?\n/);
  const outputBox = document.getElementById('outputText');

  // Build mapping dictionary
  const map = {};
  mappingLines.forEach(line => {
    const [key, val] = line.split('=');
    if (key && val) map[key.trim()] = val.trim();
  });

  // Replace names with IDs
  const output = input.map(line => map[line.trim()] || line).join('\n');
  outputBox.value = output;
}

// Generate unique lines (does not affect input)
function generateUnique() {
  const inputBox = document.getElementById('inputText');
  const uniqueBox = document.getElementById('uniqueText');
  const lines = inputBox.value.trim().split(/\r?\n/).filter(Boolean);
  const uniqueLines = [...new Set(lines)];
  uniqueBox.value = uniqueLines.join('\n');
  alert('✅ Unique PON names extracted successfully!');
}

// Copy output
function copyOutput() {
  const output = document.getElementById('outputText');
  output.select();
  document.execCommand('copy');
  alert('✅ Output copied to clipboard!');
}

// Live update
document.getElementById('inputText').addEventListener('input', convertText);
document.getElementById('mappingText').addEventListener('input', convertText);
</script>

</body>
</html>
